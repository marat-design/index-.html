<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дамир & Ленора | Үйлену тойы</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b8860b; --soft-gold: #d4af37; --ivory: #fdfaf1; }
        body { margin: 0; font-family: 'Cormorant Garamond', serif; background-color: var(--ivory); color: #2c2c2c; }
        .reveal { opacity: 0; transform: translateY(30px); transition: 1.2s all ease; text-align: center; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .hero { height: 100vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 4.5rem; margin: 10px 0; }
        .info-card { background: #fff; border: 1px solid #e8e0cc; padding: 40px 20px; margin: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 600px; margin-left: auto; margin-right: auto; }
        .ornament { width: 80px; fill: var(--soft-gold); margin-bottom: 10px; }
        .map-frame { width: 90%; height: 350px; border: 5px solid white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 20px auto; max-width: 600px; }
        .btn { background: var(--gold); color: white; border: none; padding: 16px; width: 80%; max-width: 300px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-weight: bold; border-radius: 5px; margin-top: 20px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="reveal active">
            <p style="letter-spacing: 4px;">ТОЙҒА ШАҚЫРУ</p>
            <h1>Дамир & Ленора</h1>
            <p style="font-size: 1.5rem;">19.06.2026</p>
        </div>
    </div>

    <section class="reveal" style="padding: 60px 20px;">
        <svg class="ornament" viewBox="0 0 100 50"><path d="M10,25 Q25,0 50,25 T90,25 M10,25 Q25,50 50,25 T90,25" fill="none" stroke="#d4af37" stroke-width="2"/></svg>
        <h2>Құрметті қонақтар!</h2>
        <div class="info-card">
            <p style="font-size: 1.4rem; font-style: italic;">Ақ тілекпен сіздерді ұлымыз <b>Дамир</b> мен келініміз <b>Ленораның</b> үйлену тойына арналған ақ дастарханымызға шақырамыз!</p>
            <div style="height: 1px; width: 50px; background: var(--soft-gold); margin: 20px auto;"></div>
            <p style="font-weight: bold; letter-spacing: 2px; color: var(--gold);">ТҮГІС ҚОСАЙ</p>
        </div>
    </section>

    <section class="reveal" style="background: #f9f5eb; padding: 40px 20px;">
        <h3>Той мекен-жайы:</h3>
        <p>«Алтын холл» рестораны<br>Бәйтерек, Құлжа тас жолы, 133</p>
        <div class="map-frame">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2903.411624653535!2d77.2415123!3d43.3056345!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDPCsDE4JzIwLjMiTiA3N8KwMTQnMzAuMSJF!5e0!3m2!1skk!2skz!4v1700000000000" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

    <section class="reveal" style="padding: 60px 20px;">
        <p>Той иелері: <b>Ерболат — Назгүл</b></p>
        <button class="btn" onclick="sendWhatsApp()">WhatsApp-қа жауап беру</button>
    </section>

    <script>
        function reveal() {
            var rev = document.querySelectorAll(".reveal");
            for(var i=0; i<rev.length; i++) {
                var wh = window.innerHeight;
                var top = rev[i].getBoundingClientRect().top;
                if(top < wh - 100) rev[i].classList.add("active");
            }
        }
        window.addEventListener("scroll", reveal);
        window.onload = reveal;

        function sendWhatsApp() {
            const phone = "77073941943";
            const text = "Сәлеметсіз бе! Дамир мен Ленораның тойына шақыруыңызды алдық. Рахмет!";
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
